name: Carson

on:
  schedule:
    - cron: '0 4 * * *'
  push:
    branches:
      - master
  pull_request_target:
    types: [opened, synchronize, reopened, edited, closed, ready_for_review, converted_to_draft]
  pull_request_review:
    types: [submitted]
  issues:
    types: [opened, edited]
  issue_comment:
    types: [created]

jobs:
  carson:
    runs-on: ubuntu-latest
    steps:
      - uses: NexusPHP/carson@1.x
        with:
          app_id: ${{ secrets.CARSON_APP_ID }}
          private_key: ${{ secrets.CARSON_PRIVATE_KEY }}
          log_level: debug
